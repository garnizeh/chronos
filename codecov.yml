# ==============================================================================
# Chronos - Codecov Configuration
# ==============================================================================

coverage:
  precision: 2
  round: down
  range: "70...100"

  status:
    project:
      default:
        # The overall project must maintain at least 85% coverage (we are currently at ~95%).
        target: 85%
        # Threshold: allow a tiny 1% drop before failing (to prevent strictly numerical noise).
        threshold: 1%
        
    patch:
      default:
        # THE PRAGMATIC GATEKEEPER:
        # Any NEW code introduced MUST be 90% covered (or explicitly justified in comments).
        target: 90%

# Ignore files that do not contain core business logic or are 
# inherently impossible to unit-test without side effects.
ignore:
  - "target/**/*"            # Build artifacts
  - "tests/**/*"             # Integration tests
  - "benches/**/*"           # Performance benchmarks
  - "examples/**/*"          # Example code
  - ".sqlx/**/*"             # Cached SQLx metadata
  - "**/migrations/**/*"     # Raw SQL migration files
  - "crates/chronos-daemon/src/main.rs" # Entry point is pure wire-up logic
  - ".agents/**/*"           # Agent workflows and rules
  - "docs/**/*"              # Documentation and roadmap
  - ".github/**/*"           # CI/CD configurations

comment:
  # Keep the PR comment clean and strictly technical
  layout: "header, diff, changes"
  behavior: default
  require_changes: false