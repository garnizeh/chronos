[advisories]
ignore = []

[licenses]
unlicensed = "deny"
# Reason: We want to be very strict with our Privacy-First architecture.
# Only permissive licenses that are compatible with MIT are allowed.
# `Unicode-3.0` is required by `unicode-ident` (used by proc-macro2/syn).
# `Apache-2.0 WITH LLVM-exception` is used by compiler builtins and LLVM tooling.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-3.0",
]
deny = [
    "GPL-1.0",
    "GPL-2.0",
    "GPL-3.0",
    "AGPL-1.0",
    "AGPL-3.0",
]
copyleft = "deny"
allow-osi-fsf-free = "neither"

[bans]
multiple-versions = "warn"
highlight = "all"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
