[package]
name = "chronos-inference"
version = "0.1.0"
edition = "2021"

[dependencies]
chronos-core = { path = "../chronos-core" }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde_json = "1"
base64 = "0.22"
tokio = { version = "1", features = ["full"] }
