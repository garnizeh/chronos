# ──────────────────────────────────────────────────────────────────────────────
# Chronos CI — runs cargo fmt, clippy, and tests on every push/PR
# ──────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  # Fail CI on any rustc/clippy warning — keeps the codebase clean from day 1
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Rust toolchain (stable) ──────────────────────────────────────
      #    llvm-tools-preview is required by cargo-llvm-cov to read
      #    LLVM instrumentation data (similar to -coverprofile in Go).
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy, llvm-tools-preview

      # ── 3. Install cargo-llvm-cov ──────────────────────────────────────
      #    Source-based code coverage using LLVM instrumentation.
      #    Think of it as Go's `go test -coverprofile` but for Rust.
      - uses: taiki-e/install-action@cargo-llvm-cov

      # ── 4. Cargo cache ─────────────────────────────────────────────────
      #    Caches ~/.cargo/registry, ~/.cargo/git, and target/
      #    Dramatically speeds up builds after the first run.
      - uses: Swatinem/rust-cache@v2

      # ── 5. Format check ────────────────────────────────────────────────
      #    Equivalent to `go fmt` — enforces consistent style.
      - name: cargo fmt
        run: cargo fmt --all -- --check

      # ── 6. Lint ────────────────────────────────────────────────────────
      #    Equivalent to `go vet` + `staticcheck` combined.
      #    -D warnings: treat all warnings as errors.
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # ── 7. Tests + Coverage ────────────────────────────────────────────
      #    Runs all workspace tests with LLVM instrumentation and
      #    outputs an lcov report for Codecov ingestion.
      - name: Generate code coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info

      # ── 8. Upload coverage to Codecov ──────────────────────────────────
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

